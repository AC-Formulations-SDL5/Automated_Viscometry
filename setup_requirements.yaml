project:
  name: Automated_Viscometry
  python: ">=3.9"

setup:
  create_virtualenv:
    windows: "python -m venv .venv && .venv\\Scripts\\activate"
    linux_mac: "python3 -m venv .venv && source .venv/bin/activate"

  install_base:
    - "python -m pip install --upgrade pip"
    - "python -m pip install -r requirements.txt"
    - "python -m pip install -e ."

profiles:
  automation:
    description: "Minimum stack for CNC + viscometer + ESP32 orchestration"
    libraries:
      - "numpy>=2.0"
      - "scipy>=1.13"
      - "pyserial>=3.5"
      - "PyYAML>=6.0"
    launch:
      command: "python run_viscometry.py"
      web_ui: "http://localhost:5001"

  web_interface:
    description: "Flask + Socket.IO web backend and realtime communication"
    libraries:
      - "Flask==2.3.3"
      - "flask-socketio==5.3.6"
      - "python-socketio==5.9.0"
      - "python-engineio==4.7.1"
      - "Werkzeug==2.3.7"
      - "Jinja2==3.1.2"
      - "MarkupSafe==2.1.3"
      - "itsdangerous==2.1.2"
      - "click==8.1.7"
      - "eventlet==0.33.3"
      - "greenlet==2.0.2"
      - "gunicorn==21.2.0  # optional production server"
    install:
      - "python -m pip install -r requirements_web.txt"

  analysis_optional:
    description: "Optional analysis and notebook stack"
    libraries:
      - "pandas>=2.3"
      - "matplotlib>=3.9"
      - "seaborn>=0.13"
      - "scikit-learn>=1.5"
      - "statsmodels>=0.14"
      - "lmfit>=1.3"
      - "emcee>=3.1"

paths:
  launcher: "./run_viscometry.py"
  package_root: "./src/viscometry"
  web_backend: "./src/viscometry/web/app.py"
  config: "./config/locations.yaml"
  template: "./templates/index.html"
  static_assets: "./static"
  results: "./results"
