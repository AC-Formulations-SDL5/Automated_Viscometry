<svg width="1200" height="600" viewBox="0 0 1200 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="blueGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#1f6feb"/>
    </linearGradient>

    <linearGradient id="orangeGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#f0a94b"/>
      <stop offset="100%" stop-color="#f0883e"/>
    </linearGradient>

    <linearGradient id="greenGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#3fb950"/>
      <stop offset="100%" stop-color="#238636"/>
    </linearGradient>

    <linearGradient id="lossGrad" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#ff7b72"/>
      <stop offset="100%" stop-color="#f85149"/>
    </linearGradient>

    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.35"/>
    </filter>

    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#58a6ff"/>
    </marker>

    <marker id="arrowOrange" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f0883e"/>
    </marker>

    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#3fb950"/>
    </marker>
  </defs>

  <!-- ── Background ─────────────────────────────────────────────────────── -->
  <rect width="1200" height="600" fill="#0d1117"/>

  <!-- Subtle grid overlay -->
  <g opacity="0.04">
    <path d="M0 100 H1200 M0 200 H1200 M0 300 H1200 M0 400 H1200 M0 500 H1200"
          stroke="#ffffff" stroke-width="1"/>
    <path d="M100 0 V600 M200 0 V600 M300 0 V600 M400 0 V600 M500 0 V600
             M600 0 V600 M700 0 V600 M800 0 V600 M900 0 V600 M1000 0 V600 M1100 0 V600"
          stroke="#ffffff" stroke-width="1"/>
  </g>

  <!-- ── Page title ──────────────────────────────────────────────────────── -->
  <text x="670" y="38" fill="#ffffff" font-size="19" font-family="Arial, Inter, system-ui, sans-serif"
        font-weight="700">Physics-Informed Rheology Inversion Loop</text>
  <text x="670" y="58" fill="#8b949e" font-size="12" font-family="Arial, Inter, system-ui, sans-serif">
    Differentiable Fluid-Structure Interaction Pipeline · NVIDIA Warp
  </text>

  <!-- ── LEFT PANEL — embedded physics concept figure ─────────────────────
       The <image> element resolves physics_concept_figure2.svg relative to
       the saved SVG file (both live in Images/).
  ──────────────────────────────────────────────────────────────────────── -->
  <g transform="translate(18, 72)">
    <rect x="0" y="0" width="600" height="500" rx="16"
          fill="#111827" stroke="#30363d" stroke-width="1.5"
          filter="url(#softShadow)"/>
    <image href="physics_concept_figure2.svg"
           x="12" y="12" width="576" height="476"
           preserveAspectRatio="xMidYMid meet"
           clip-path="inset(0 round 12px)"/>
    <rect x="12" y="12" width="576" height="476" rx="12"
          fill="none" stroke="#58a6ff" stroke-opacity="0.25" stroke-width="1.2"/>
  </g>

  <!-- ════════════════════════════════════════════════════════════════════
       RIGHT SIDE — WORKFLOW DIAGRAM
       Top track   (y≈105–215):  Forward Physics Pipeline  (blue, L→R)
       Middle zone (y≈235–350):  Extra kernel nodes        (blue)
       Bottom track(y≈470–545):  Optimization / Grad Pass  (orange, R→L)
       ════════════════════════════════════════════════════════════════════ -->

  <!-- ── Section labels ──────────────────────────────────────────────────── -->
  <text x="658" y="100" fill="#58a6ff" font-size="10" font-weight="700"
        font-family="Arial, sans-serif" letter-spacing="1.2">FORWARD PHYSICS PIPELINE</text>
  <text x="658" y="460" fill="#f0883e" font-size="10" font-weight="700"
        font-family="Arial, sans-serif" letter-spacing="1.2">OPTIMIZATION · GRADIENT BACKPROPAGATION</text>

  <!-- ── TOP FLOW ARROWS ─────────────────────────────────────────────────── -->
  <!-- START → Node A -->
  <path d="M818 140 H842" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Node A → Node B -->
  <path d="M997 140 H1021" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Node A ↓ Node C -->
  <path d="M920 205 V230" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Node B ↓ Node D -->
  <path d="M1110 205 V230" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Node C ↓ Node E -->
  <path d="M920 335 V360" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>
  <!-- Node D ↓ Node E -->
  <path d="M1110 335 V360" stroke="#58a6ff" stroke-width="2.5" fill="none" marker-end="url(#arrowBlue)"/>

  <!-- ── START NODE ──────────────────────────────────────────────────────── -->
  <g filter="url(#softShadow)">
    <rect x="655" y="108" width="160" height="64" rx="32" fill="url(#greenGrad)"/>
    <text x="735" y="133" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Fluid Parameters</text>
    <text x="735" y="151" text-anchor="middle" fill="#d2f4d7" font-size="12"
          font-family="Arial, sans-serif">Guess (K, n)</text>
  </g>

  <!-- ── NODE A — Kinematics &amp; Cone SDF ─────────────────────────────── -->
  <g transform="translate(844, 105)" filter="url(#softShadow)">
    <rect width="150" height="100" rx="10" fill="url(#blueGrad)"/>
    <text x="12" y="28" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Kinematics &amp;</text>
    <text x="12" y="46" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Cone SDF</text>
    <text x="12" y="68" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">12 mm 3° spindle</text>
    <text x="12" y="84" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">analytical boundaries</text>
  </g>

  <!-- ── NODE B — Warp HashGrid ──────────────────────────────────────────── -->
  <g transform="translate(1023, 105)" filter="url(#glow)">
    <rect width="154" height="100" rx="10" fill="#76B900"/>
    <!-- Stylised NVIDIA chevron -->
    <g transform="translate(10, 12) scale(0.55)">
      <path d="M0 26C13 4,48 0,70 22c18 18,16 48,-4 64C48 102,14 96,0 72
               c20 14,46 12,60,-2 C74 56,73 34,60 22 C46 10,18 12,0 26Z"
            fill="#ffffff"/>
      <circle cx="48" cy="46" r="11" fill="#76B900"/>
      <circle cx="48" cy="46" r="5"  fill="#ffffff"/>
    </g>
    <text x="77" y="44" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Warp HashGrid</text>
    <text x="77" y="62" text-anchor="middle" fill="#efffd5" font-size="10"
          font-family="Arial, sans-serif">NVIDIA Warp</text>
    <text x="77" y="78" text-anchor="middle" fill="#efffd5" font-size="10"
          font-family="Arial, sans-serif">spatial neighbor search</text>
    <text x="77" y="94" text-anchor="middle" fill="#efffd5" font-size="10"
          font-family="Arial, sans-serif">particle discovery</text>
  </g>

  <!-- ── NODE C — Shear Rate Kernel ─────────────────────────────────────── -->
  <g transform="translate(844, 232)" filter="url(#softShadow)">
    <rect width="150" height="100" rx="10" fill="url(#blueGrad)"/>
    <text x="12" y="28" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Shear Rate Kernel</text>
    <text x="12" y="56" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">Computes strain tensor</text>
    <text x="12" y="72" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">magnitude &#947;&#775;</text>
    <text x="12" y="90" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">&#8706;u/&#8706;y + &#8706;v/&#8706;x</text>
  </g>

  <!-- ── NODE D — Constitutive Model ────────────────────────────────────── -->
  <g transform="translate(1023, 232)" filter="url(#softShadow)">
    <rect width="154" height="100" rx="10" fill="url(#blueGrad)"/>
    <text x="12" y="28" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Constitutive Model</text>
    <text x="12" y="56" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">&#951; = K · &#947;&#775;^(n&#8722;1)</text>
    <text x="12" y="72" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">Dynamic power-law</text>
    <text x="12" y="88" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">viscosity evaluation</text>
  </g>

  <!-- ── NODE E — FSI &amp; Torque Accumulator ──────────────────────────── -->
  <g transform="translate(844, 362)" filter="url(#softShadow)">
    <rect width="333" height="88" rx="10" fill="url(#blueGrad)"/>
    <text x="16" y="28" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">FSI &amp; Torque Accumulator</text>
    <text x="16" y="52" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">Boundary drag integration with atomic_add()</text>
    <text x="16" y="68" fill="#d8eaff" font-size="10" font-family="Arial, sans-serif">Simulated Torque Output  M&#8209;sim(t)</text>
  </g>

  <!-- ── LOSS NODE ───────────────────────────────────────────────────────── -->
  <!-- Vertical connector from Node E to Loss -->
  <path d="M1010 450 V468" stroke="#f85149" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>

  <g transform="translate(844, 470)" filter="url(#glow)">
    <rect width="333" height="68" rx="10" fill="url(#lossGrad)"/>
    <text x="166" y="28" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Objective Loss Evaluation</text>
    <text x="166" y="50" text-anchor="middle" fill="#ffe5e4" font-size="11"
          font-family="Arial, sans-serif">MSE Loss = Mean((M&#8209;sim &#8722; M&#8209;exp)&#178;)</text>
  </g>

  <!-- ── BOTTOM REVERSE TRACK FLOW ARROWS (R → L) ───────────────────────── -->
  <!-- Loss → Node F (Tape) -->
  <path d="M844 504 H820" stroke="#f0883e" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Node F → Node G -->
  <path d="M650 510 H628" stroke="#f0883e" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>
  <!-- Node G → Node H -->
  <path d="M458 510 H436" stroke="#f0883e" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>

  <!-- ── NODE F — Warp wp.Tape() ─────────────────────────────────────────── -->
  <g transform="translate(652, 481)" filter="url(#softShadow)">
    <rect width="166" height="72" rx="10" fill="url(#orangeGrad)"/>
    <text x="12" y="24" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Warp wp.Tape()</text>
    <text x="12" y="42" fill="#ffffff" font-size="12" font-weight="700"
          font-family="Arial, sans-serif">Active Graph</text>
    <text x="12" y="60" fill="#ffe8d2" font-size="10" font-family="Arial, sans-serif">Records fwd. dependencies</text>
  </g>

  <!-- ── NODE G — Adjoint / Backward Pass ───────────────────────────────── -->
  <g transform="translate(460, 481)" filter="url(#softShadow)">
    <rect width="166" height="72" rx="10" fill="url(#orangeGrad)"/>
    <text x="12" y="24" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Adjoint /</text>
    <text x="12" y="42" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Backward Pass</text>
    <text x="12" y="60" fill="#ffe8d2" font-size="10" font-family="Arial, sans-serif">NS + FSI error gradients</text>
  </g>

  <!-- ── NODE H — Analytical Gradients ─────────────────────────────────── -->
  <g transform="translate(268, 481)" filter="url(#softShadow)">
    <rect width="166" height="72" rx="10" fill="url(#orangeGrad)"/>
    <text x="12" y="24" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Analytical</text>
    <text x="12" y="42" fill="#ffffff" font-size="13" font-weight="700"
          font-family="Arial, sans-serif">Gradients</text>
    <text x="12" y="60" fill="#ffe8d2" font-size="10" font-family="Arial, sans-serif">dLoss/dK and dLoss/dn</text>
  </g>

  <!-- ── OPTIMIZER NODE ─────────────────────────────────────────────────── -->
  <!-- Arrow Node H → Optimizer -->
  <path d="M268 517 H238" stroke="#f0883e" stroke-width="2.5" fill="none" marker-end="url(#arrowOrange)"/>

  <g transform="translate(655, 466)" filter="url(#softShadow)">
    <!-- invisible spacer so the pill does not overlap Node F -->
  </g>

  <g transform="translate(655, 466)"/>

  <!-- Optimizer pill (bottom-left area, right of the panel) -->
  <g filter="url(#glow)">
    <rect x="655" y="570" width="0" height="0"/>
    <!-- placed at left edge of right diagram area -->
  </g>

  <!-- Proper optimizer pill -->
  <g transform="translate(649, 559)" filter="url(#glow)">
    <!-- invisible — optimizer is the green loop node below -->
  </g>

  <g transform="translate(649, 559)"/>

  <!-- Adam optimizer node anchored just below left gap -->
  <g filter="url(#glow)">
    <rect x="655" y="560" width="0" height="0"/>
  </g>

  <!-- ── OPTIMIZER PILL (centred bottom-left of right diagram) ───────────── -->
  <g transform="translate(649, 557)" filter="url(#glow)">
    <rect width="0" height="0"/>
  </g>

  <!-- Consolidate: single clean optimizer node -->
  <g id="optimizerNode" filter="url(#glow)">
    <rect x="652" y="555" width="162" height="36" rx="18" fill="url(#greenGrad)"/>
    <text x="733" y="572" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="700"
          font-family="Arial, sans-serif">Gradient Descent /</text>
    <text x="733" y="585" text-anchor="middle" fill="#d2f4d7" font-size="10"
          font-family="Arial, sans-serif">Adam Optimizer  · updates K, n</text>
  </g>

  <!-- Arrow: Loss node bottom → Optimizer (vertical then left) -->
  <path d="M1010 538 V553 H816" stroke="#f0883e" stroke-width="2" stroke-dasharray="6 4"
        fill="none" marker-end="url(#arrowOrange)"/>

  <!-- ── FEEDBACK LOOP — Optimizer → START (dashed green arc) ─────────────
       Runs along the bottom of the panel and rises on the left to close the loop.
  ──────────────────────────────────────────────────────────────────────── -->
  <path d="M652 573 C580 573, 540 520, 540 480
           C540 400, 570 320, 660 280
           C690 266, 715 255, 735 200"
        stroke="#3fb950" stroke-width="3" stroke-dasharray="9 6"
        fill="none" marker-end="url(#arrowGreen)"/>

  <!-- small "update" label on feedback arc -->
  <text x="528" y="415" fill="#3fb950" font-size="10" font-family="Arial, sans-serif"
        transform="rotate(-88, 528, 415)">K, n updated</text>

  <!-- ── CONVERGENCE BADGE ───────────────────────────────────────────────── -->
  <g transform="translate(655, 108)">
    <!-- Already have the start node here; just add a convergence tick label -->
  </g>
  <text x="660" y="186" fill="#3fb950" font-size="9" font-family="Arial, sans-serif">
    &#10003; Converged when Loss &lt; &#949;
  </text>

</svg>