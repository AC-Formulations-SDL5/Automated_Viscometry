    <line x1="140" y1="425" x2="230" y2="425" stroke="#f85149" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M 150 402 L 150 425" fill="none" stroke="#f85149" stroke-width="1.5" marker-start="url(#arrow-grey)" marker-end="url(#arrow-grey)"/>
    <text x="135" y="418" font-family="Arial, sans-serif" font-style="italic" font-size="15" fill="#f85149">h</text>

    <line x1="367" y1="220" x2="385" y2="220" stroke="#2188ff" stroke-width="1" stroke-dasharray="2,2"/>
    <line x1="370" y1="425" x2="385" y2="425" stroke="#2188ff" stroke-width="1" stroke-dasharray="2,2"/>
    <path d="M 385 220 L 385 425" fill="none" stroke="#2188ff" stroke-width="2" marker-start="url(#arrow-blue)" marker-end="url(#arrow-blue)"/>
    <text x="393" y="328" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#2188ff">H(r)</text>
