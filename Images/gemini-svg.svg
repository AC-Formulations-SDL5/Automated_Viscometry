      <text x="65" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Cone SDF</text>
      <text x="65" y="56" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">12mm 3° Spindle Bounds</text>
    </g>

