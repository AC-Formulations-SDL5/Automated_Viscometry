      <text x="72" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Adjoint /</text>
      <text x="72" y="44" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Backward Pass</text>
      <text x="72" y="58" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Reverse Mode Derivatives</text>
    </g>

    <g transform="translate(195, 360)">
      <rect x="0" y="0" width="135" height="70" rx="8" fill="#2c1a10" stroke="#f0883e" stroke-width="1.5"/>
      <text x="67" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Analytical</text>
      <text x="67" y="44" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Gradients</text>
      <text x="67" y="58" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#ff7b72" text-anchor="middle">∂Loss/∂K, ∂Loss/∂n</text>
    </g>

    <g transform="translate(10, 355)">
      <rect x="0" y="0" width="150" height="80" rx="10" fill="#1b1f14" stroke="#76b900" stroke-width="2" filter="url(#glow-nvidia)"/>
      <rect x="5" y="5" width="140" height="4" rx="2" fill="#76b900"/>
      <text x="75" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#76b900" text-anchor="middle">Adam / GD Optimizer</text>
      <text x="75" y="48" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Parameter Update</text>
      <text x="75" y="64" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">K ← K - α·m̂, n ← n - α·m̂</text>
    </g>

