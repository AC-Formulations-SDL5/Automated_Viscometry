      <text x="62" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Shear Rate</text>
      <text x="62" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Kernel</text>
      <text x="62" y="55" font-family="Arial, sans-serif" font-size="10" font-style="italic" fill="#8b949e" text-anchor="middle">Strain Tensor γ̇</text>
    </g>

    <g transform="translate(170, 215)">
      <rect x="0" y="0" width="130" height="65" rx="8" fill="#162035" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="65" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Constitutive</text>
      <text x="65" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Model</text>
      <text x="65" y="56" font-family="Arial, sans-serif" font-size="10" fill="#8b949e" text-anchor="middle">η = K · γ̇ ⁿ⁻¹</text>
    </g>

    <g transform="translate(330, 215)">
      <rect x="0" y="0" width="125" height="65" rx="8" fill="#162035" stroke="#1f6feb" stroke-width="1.5"/>
      <text x="62" y="26" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">FSI &amp; Torque</text>
      <text x="62" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#58a6ff" text-anchor="middle">Accumulator</text>
      <text x="62" y="55" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">atomic_add → M_sim(t)</text>
    </g>

    <g transform="translate(540, 205)">
      <rect x="0" y="0" width="150" height="85" rx="10" fill="#341215" stroke="#f85149" stroke-width="2.5"/>
      <text x="75" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f85149" text-anchor="middle">LOSS JUNCTION</text>
      <text x="75" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Objective Loss</text>
      <text x="75" y="58" font-family="Arial, sans-serif" font-size="10" fill="#ff7b72" text-anchor="middle">MSE = Mean((M_sim - M_exp)²)</text>
    </g>

    <g transform="translate(545, 360)">
      <rect x="0" y="0" width="140" height="70" rx="8" fill="#2c1a10" stroke="#f0883e" stroke-width="1.5"/>
      <text x="70" y="24" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#f0883e" text-anchor="middle">Warp wp.Tape()</text>
      <text x="70" y="42" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Active Graph</text>
      <text x="70" y="56" font-family="Arial, sans-serif" font-size="9" fill="#8b949e" text-anchor="middle">Forward Dependency Record</text>
    </g>

    <g transform="translate(365, 360)">
