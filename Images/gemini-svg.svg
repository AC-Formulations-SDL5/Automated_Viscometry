    <line x1="230" y1="425" x2="255" y2="222" stroke="#f0883e" stroke-width="1.5" stroke-dasharray="3,3"/>
    
    <path d="M 230 380 L 235 380" fill="none" stroke="#ffab70" stroke-width="2" marker-end="url(#arrow-orange)"/>
