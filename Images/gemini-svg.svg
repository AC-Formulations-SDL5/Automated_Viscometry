<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0f19" />
      <stop offset="50%" stop-color="#111625" />
      <stop offset="100%" stop-color="#070a10" />
    </linearGradient>

    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#58a6ff"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#f0883e"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#3fb950"/>
    </marker>
    <marker id="arrow-grey" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 8 5 L 0 8.5 z" fill="#8b949e"/>
    </marker>

    <filter id="glow-nvidia" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <radialGradient id="plateGrad" cx="50%" cy="50%" r="50%" fx="30%" fy="30%">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="70%" stop-color="#94a3b8"/>
      <stop offset="100%" stop-color="#475569"/>
    </radialGradient>
    <linearGradient id="coneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cbd5e1" />
      <stop offset="50%" stop-color="#94a3b8" />
      <stop offset="100%" stop-color="#64748b" />
    </linearGradient>
    <linearGradient id="fluidGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f6feb" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="600" fill="url(#bgGrad)"/>
  
  <rect x="15" y="15" width="1170" height="570" fill="none" stroke="#21262d" stroke-width="2" rx="12"/>

  <g transform="translate(40, 20)">
    <text x="230" y="45" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#ffffff" text-anchor="middle">Cone-and-Plate Rheometer Setup</text>
    
    <ellipse cx="230" cy="410" rx="150" ry="45" fill="none" stroke="#58a6ff" stroke-width="1.5" stroke-dasharray="4,4"/>
    
    <path d="M 60 440 C 60 475, 400 475, 400 440 L 400 460 C 400 495, 60 495, 60 460 Z" fill="#334155" stroke="#475569" stroke-width="1"/>
    <ellipse cx="230" cy="440" rx="170" ry="45" fill="url(#plateGrad)" stroke="#64748b" stroke-width="1.5"/>
    <ellipse cx="230" cy="440" rx="155" ry="38" fill="none" stroke="#475569" stroke-width="1" stroke-dasharray="2,2"/>
    <text x="230" y="505" font-family="Arial, sans-serif" font-size="14" fill="#8b949e" text-anchor="middle">Stationary plate</text>

