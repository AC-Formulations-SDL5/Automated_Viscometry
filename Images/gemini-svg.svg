    <path d="M 455 247.5 L 532 247.5" fill="none" stroke="#58a6ff" stroke-width="2" marker-end="url(#arrow-blue)"/>

    <path d="M 615 290 L 615 352" fill="none" stroke="#f85149" stroke-width="2" marker-end="url(#arrow-orange)"/>

    <path d="M 545 395 L 518 395" fill="none" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
    <path d="M 365 395 L 338 395" fill="none" stroke="#f0883e" stroke-width="2" marker-end="url(#arrow-orange)"/>
