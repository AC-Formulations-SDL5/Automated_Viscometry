    <path d="M 230 402 L 270 402" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <path d="M 260 402 A 30 30 0 0 0 252 375" fill="none" stroke="#3fb950" stroke-width="1.5"/>
    <text x="275" y="392" font-family="Arial, sans-serif" font-size="14" fill="#3fb950">α</text>

