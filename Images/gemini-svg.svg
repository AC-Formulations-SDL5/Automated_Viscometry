  <line x1="460" y1="40" x2="460" y2="560" stroke="#21262d" stroke-width="1.5" stroke-dasharray="4,4"/>

  <g transform="translate(480, 20)">
    <text x="340" y="25" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#ffffff" text-anchor="middle">Physics-Informed Rheology Inversion Loop</text>
    <text x="340" y="50" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="#76b900" text-anchor="middle">using NVIDIA Warp</text>

    <text x="160" y="90" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8b949e" letter-spacing="1">FORWARD PHYSICS PIPELINE</text>
    <text x="500" y="555" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#8b949e" letter-spacing="1">OPTIMIZATION &amp; BACKPROPAGATION PIPELINE</text>

    <g transform="translate(10, 110)">
      <rect x="0" y="0" width="130" height="75" rx="37.5" fill="#13231b" stroke="#3fb950" stroke-width="2"/>
      <text x="65" y="28" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#3fb950" text-anchor="middle">START:</text>
      <text x="65" y="44" font-family="Arial, sans-serif" font-size="11" fill="#ffffff" text-anchor="middle">Fluid Parameters</text>
      <text x="65" y="58" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#ffffff" text-anchor="middle">Guess (K, n)</text>
    </g>

    <g transform="translate(170, 110)">
      <rect x="0" y="0" width="130" height="65" rx="8" fill="#162035" stroke="#1f6feb" stroke-width="1.5"/>
