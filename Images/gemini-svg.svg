    <ellipse cx="230" cy="220" rx="137" ry="32" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
    <text x="160" y="224" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1f2937">Cone</text>

