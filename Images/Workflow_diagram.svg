  <rect x="80" y="670" width="541" height="120" fill="#E8F0FE" stroke="#1A73E8" class="box" filter="url(#shadow)"/>
  <line x1="167" y1="700" x2="167" y2="770" stroke="#DADCE0" stroke-width="1.5"/>
