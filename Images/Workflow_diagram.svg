  <line x1="167" y1="300" x2="167" y2="380" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="350" y="285" class="title" fill="#F9AB00">3. Sample Cell Selection</text>
  <text x="185" y="315" class="text">• Full tray / row / custom cells</text>
  <text x="185" y="338" class="text">• Assign RPM profiles</text>
  <g transform="translate(-385 37)">
  <circle cx="515" cy="288" r="28" class="icon-bg" stroke="#F9AB00"/>
  <circle cx="515" cy="288" r="23" fill="none" stroke="#FEEFC3" stroke-width="2"/>
  <rect x="500" y="272" width="30" height="30" fill="none" stroke="#F9AB00" stroke-width="2" rx="4"/>
  <line x1="506" y1="280" x2="524" y2="280" class="icon-line" stroke="#F9AB00"/>
  <polyline points="506,289 510,293 518,285" class="icon-line" stroke="#F9AB00"/>
  <polyline points="506,298 510,302 518,294" class="icon-line" stroke="#F9AB00"/>
  </g>

  <!-- 4 Z DESCENT (RIGHT COLUMN) -->
  <rect x="680" y="250" width="541" height="150" fill="#E8F0FE" stroke="#1A73E8" class="box" filter="url(#shadow)"/>
  <line x1="767" y1="300" x2="767" y2="380" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="950" y="285" class="title" fill="#1A73E8">4. Automated Z-Descent Characterization</text>
  <text x="785" y="315" class="text">• Move spindle above sample</text>
  <text x="785" y="338" class="text">• Incremental Z-step descent</text>
  <text x="785" y="361" class="text">• Maintain controlled spindle-floor gap</text>
  <g transform="translate(-335 37)">
  <circle cx="1065" cy="288" r="23" fill="none" stroke="#D2E3FC" stroke-width="2"/>
  <line x1="1065" y1="268" x2="1065" y2="295" class="icon-line" stroke="#1A73E8"/>
  <polyline points="1055,287 1065,297 1075,287" class="icon-line" stroke="#1A73E8"/>
  <line x1="1054" y1="303" x2="1076" y2="303" class="icon-line" stroke="#1A73E8"/>
  </g>

  <!-- 5 RPM SWEEP (LEFT COLUMN) -->
  <rect x="80" y="450" width="541" height="170" fill="#F3E8FD" stroke="#A142F4" class="box" filter="url(#shadow)"/>
  <line x1="167" y1="500" x2="167" y2="600" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="350" y="485" class="title" fill="#A142F4">5. RPM Sweep &amp; Torque Acquisition</text>
  <text x="185" y="515" class="text">• Apply rotational speeds</text>
  <text x="185" y="538" class="text">• Measure torque vs time</text>
  <text x="185" y="561" class="text">• Compute rotational drag</text>
  <text x="185" y="584" class="text">• Live data streaming</text>
  <g transform="translate(-385 47)">
  <circle cx="515" cy="488" r="28" class="icon-bg" stroke="#A142F4"/>
  <circle cx="515" cy="488" r="23" fill="none" stroke="#E9D7FE" stroke-width="2"/>
  <path d="M498 497 A17 17 0 0 1 532 497" class="icon-line" stroke="#A142F4"/>
  <line x1="515" y1="497" x2="526" y2="486" class="icon-line" stroke="#A142F4"/>
  <circle cx="515" cy="497" r="3" class="icon-fill" fill="#A142F4"/>
  <line x1="504" y1="503" x2="526" y2="503" class="icon-line" stroke="#A142F4"/>
  </g>

  <!-- 6 FEEDBACK (RIGHT COLUMN) -->
  <rect x="680" y="450" width="541" height="170" fill="#E0F2F1" stroke="#00ACC1" class="box" filter="url(#shadow)"/>
  <line x1="767" y1="500" x2="767" y2="600" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="950" y="485" class="title" fill="#00ACC1">6. Physics-Constrained Feedback Analysis</text>
  <text x="785" y="515" class="text">• Trend slope analysis</text>
  <text x="785" y="538" class="text">• Second-derivative anomaly detection</text>
  <text x="785" y="561" class="text">• Confidence-weighted hit detection</text>
  <text x="785" y="584" class="text">• Smart early-exit evaluation</text>
  <g transform="translate(-335 47)">
  <circle cx="1065" cy="488" r="28" class="icon-bg" stroke="#00ACC1"/>
  <circle cx="1065" cy="488" r="23" fill="none" stroke="#CDEFF3" stroke-width="2"/>
  <line x1="1048" y1="500" x2="1048" y2="476" class="icon-line" stroke="#00ACC1"/>
  <line x1="1048" y1="500" x2="1082" y2="500" class="icon-line" stroke="#00ACC1"/>
  <polyline points="1052,494 1058,488 1065,491 1072,482 1078,486" class="icon-line" stroke="#00ACC1"/>
  <circle cx="1078" cy="486" r="2" class="icon-fill" fill="#00ACC1"/>
