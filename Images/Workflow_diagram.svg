  <text x="185" y="745" class="text">Next Z increment</text>
  <g transform="translate(-385 30)">
  <circle cx="515" cy="700" r="28" class="icon-bg" stroke="#1A73E8"/>
  <circle cx="515" cy="700" r="23" fill="none" stroke="#D2E3FC" stroke-width="2"/>
  <path d="M502 692 H520 V707" class="icon-line" stroke="#1A73E8"/>
  <polyline points="513,700 520,707 527,700" class="icon-line" stroke="#1A73E8"/>
  <line x1="502" y1="712" x2="528" y2="712" class="icon-line" stroke="#1A73E8"/>
  </g>

  <!-- 7B HIT (RIGHT COLUMN) -->
  <rect x="680" y="670" width="541" height="120" fill="#FCE8E6" stroke="#D93025" class="box" filter="url(#shadow)"/>
  <line x1="767" y1="700" x2="767" y2="770" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="950" y="715" class="title" fill="#D93025">7B. Hit-Point Detected</text>
  <text x="785" y="745" class="text">End current cell</text>
  <g transform="translate(-335 30)">
  <circle cx="1065" cy="700" r="28" class="icon-bg" stroke="#D93025"/>
  <circle cx="1065" cy="700" r="23" fill="none" stroke="#FAD2CF" stroke-width="2"/>
  <circle cx="1065" cy="700" r="13" class="icon-line" stroke="#D93025"/>
  <circle cx="1065" cy="700" r="6" class="icon-line" stroke="#D93025"/>
  <circle cx="1065" cy="700" r="2.5" class="icon-fill" fill="#D93025"/>
  </g>

  <!-- 8 VISCOSITY (CENTER SPAN) -->
  <rect x="278.5" y="840" width="663" height="140" fill="#E8F0FE" stroke="#1A73E8" class="box" filter="url(#shadow)"/>
  <line x1="365.5" y1="870" x2="365.5" y2="970" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="610" y="875" class="title" fill="#1A73E8">8. Predicted Viscosity Estimation</text>
  <text x="383.5" y="905" class="text">• Hyperbolic drag curve fitting</text>
  <text x="383.5" y="928" class="text">• Physics-informed viscosity prediction</text>
  <text x="383.5" y="951" class="text">• Data logging and export</text>
  <g transform="translate(-646.5 32)">
  <circle cx="975" cy="878" r="28" class="icon-bg" stroke="#1A73E8"/>
  <circle cx="975" cy="878" r="23" fill="none" stroke="#D2E3FC" stroke-width="2"/>
  <path d="M962 864 H988 L983 894 H967 Z" class="icon-line" stroke="#1A73E8"/>
  <line x1="968" y1="879" x2="982" y2="879" class="icon-line" stroke="#1A73E8"/>
  <circle cx="975" cy="887" r="2" class="icon-fill" fill="#1A73E8"/>
  </g>

  <!-- 9 WASH (LEFT COLUMN) -->
  <rect x="80" y="1030" width="541" height="170" fill="#E6F4EA" stroke="#188038" class="box" filter="url(#shadow)"/>
  <line x1="167" y1="1080" x2="167" y2="1180" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="350" y="1065" class="title" fill="#188038">9. Automated Two-Stage Washing</text>
  <text x="185" y="1095" class="text">• Station-1 washing &amp; agitation</text>
  <text x="185" y="1118" class="text">• Concurrent fill/drain operations</text>
  <text x="185" y="1141" class="text">• Station-2 rinsing</text>
  <text x="185" y="1164" class="text">• Cross-contamination prevention</text>
  <g transform="translate(-385 47)">
  <circle cx="515" cy="1068" r="28" class="icon-bg" stroke="#188038"/>
  <circle cx="515" cy="1068" r="23" fill="none" stroke="#CEEAD6" stroke-width="2"/>
  <path d="M515 1049 C507 1059 507 1067 515 1075 C523 1067 523 1059 515 1049 Z" class="icon-line" stroke="#188038"/>
  <line x1="502" y1="1082" x2="528" y2="1082" class="icon-line" stroke="#188038"/>
  <line x1="505" y1="1089" x2="525" y2="1089" class="icon-line" stroke="#188038"/>
  </g>

  <!-- 10 LOOP (RIGHT COLUMN) -->
  <rect x="680" y="1030" width="541" height="170" fill="#F1F3F4" stroke="#5F6368" class="box" filter="url(#shadow)"/>
  <line x1="767" y1="1080" x2="767" y2="1180" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="950" y="1065" class="title" fill="#5F6368">10. Move to Next Sample Cell</text>
  <text x="785" y="1095" class="text">Repeat automated cycle</text>
  <g transform="translate(-335 47)">
  <circle cx="1065" cy="1068" r="28" class="icon-bg" stroke="#5F6368"/>
  <circle cx="1065" cy="1068" r="23" fill="none" stroke="#E8EAED" stroke-width="2"/>
  <path d="M1051 1068 A14 14 0 1 1 1065 1082" class="icon-line" stroke="#5F6368"/>
  <polyline points="1057,1080 1067,1082 1064,1072" class="icon-line" stroke="#5F6368"/>
  <line x1="1065" y1="1057" x2="1065" y2="1068" class="icon-line" stroke="#5F6368"/>
  </g>

