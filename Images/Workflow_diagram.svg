<svg width="1240" height="1260" viewBox="0 0 1240 1260" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <style>
      .bg { fill: #FFFFFF; }
      .box { rx: 18; ry: 18; stroke-width: 1.5; }
      .title { font: 600 24px Google Sans, Arial, sans-serif; text-anchor: middle; }
      .text { font: 22px Google Sans, Arial, sans-serif; fill: #3C4043; }
      .arrow { fill: none; stroke: #3C4043; stroke-width: 2; marker-end: url(#arrowhead); }
      .icon-bg { fill: #FFFFFF; stroke-width: 1.5; }
      .icon-line { fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
      .icon-fill { stroke: none; }
    </style>

    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <polyline points="1.5,1.5 7,4 1.5,6.5" fill="none" stroke="#3C4043" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1240" height="1260" class="bg"/>

  <!-- 1 SYSTEM INITIALIZATION (LEFT COLUMN) -->
  <rect x="80" y="40" width="541" height="170" fill="#E8F0FE" stroke="#1A73E8" class="box" filter="url(#shadow)"/>
  <line x1="167" y1="100" x2="167" y2="190" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="350" y="75" class="title" fill="#1A73E8">1. System Initialization</text>
  <text x="185" y="105" class="text">• CNC homing</text>
  <text x="185" y="128" class="text">• Viscometer initialization</text>
  <text x="185" y="151" class="text">• Pump / washing station initialization</text>
  <text x="185" y="174" class="text">• Runtime parameter loading</text>
  <g transform="translate(-385 47)">
  <circle cx="515" cy="78" r="28" class="icon-bg" stroke="#1A73E8"/>
  <circle cx="515" cy="78" r="23" fill="none" stroke="#D2E3FC" stroke-width="2"/>
  <circle cx="515" cy="78" r="9" class="icon-line" stroke="#1A73E8"/>
  <line x1="515" y1="58" x2="515" y2="66" class="icon-line" stroke="#1A73E8"/>
  <line x1="515" y1="90" x2="515" y2="98" class="icon-line" stroke="#1A73E8"/>
  <line x1="495" y1="78" x2="503" y2="78" class="icon-line" stroke="#1A73E8"/>
  <line x1="527" y1="78" x2="535" y2="78" class="icon-line" stroke="#1A73E8"/>
  <line x1="501" y1="64" x2="506" y2="69" class="icon-line" stroke="#1A73E8"/>
  <line x1="524" y1="87" x2="529" y2="92" class="icon-line" stroke="#1A73E8"/>
  </g>

  <!-- 2 CALIBRATION (RIGHT COLUMN) -->
  <rect x="680" y="40" width="541" height="170" fill="#E6F4EA" stroke="#188038" class="box" filter="url(#shadow)"/>
  <line x1="767" y1="100" x2="767" y2="190" stroke="#DADCE0" stroke-width="1.5"/>
  <text x="950" y="75" class="title" fill="#188038">2. Calibration / Recalibration</text>
  <text x="785" y="105" class="text">• Determine per-cell safe Z positions</text>
  <text x="785" y="128" class="text">• Establish spindle-floor reference heights</text>
  <text x="785" y="151" class="text">• Store calibration map</text>
  <g transform="translate(-335 47)">
  <circle cx="1065" cy="78" r="23" fill="none" stroke="#CEEAD6" stroke-width="2"/>
  <circle cx="1065" cy="78" r="14" class="icon-line" stroke="#188038"/>
  <circle cx="1065" cy="78" r="7" class="icon-line" stroke="#188038"/>
  <line x1="1065" y1="56" x2="1065" y2="64" class="icon-line" stroke="#188038"/>
  <line x1="1065" y1="92" x2="1065" y2="100" class="icon-line" stroke="#188038"/>
  <line x1="1043" y1="78" x2="1051" y2="78" class="icon-line" stroke="#188038"/>
  <line x1="1079" y1="78" x2="1087" y2="78" class="icon-line" stroke="#188038"/>
  </g>

  <!-- 3 SAMPLE SELECTION (LEFT COLUMN) -->
