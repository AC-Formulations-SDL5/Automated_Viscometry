<svg width="120" height="60" viewBox="0 0 120 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="120" height="60" fill="#2a5298" rx="8"/>
  
  <!-- Logo icon - simplified viscometer/lab equipment -->
  <g transform="translate(10, 10)">
    <!-- Base -->
    <rect x="5" y="35" width="30" height="8" fill="white" rx="2"/>
    
    <!-- Stand -->
    <rect x="18" y="25" width="4" height="10" fill="white"/>
    
    <!-- Spindle -->
    <rect x="19" y="15" width="2" height="15" fill="white"/>
    
    <!-- Sample container -->
    <circle cx="20" cy="12" r="8" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="20" cy="12" r="5" fill="rgba(255,255,255,0.3)"/>
    
    <!-- Motion lines -->
    <path d="M 12 8 Q 16 4 20 8" stroke="white" stroke-width="1.5" fill="none"/>
    <path d="M 20 8 Q 24 4 28 8" stroke="white" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Text -->
  <text x="50" y="25" fill="white" font-family="Arial, sans-serif" font-size="12" font-weight="bold">AC</text>
  <text x="50" y="40" fill="white" font-family="Arial, sans-serif" font-size="10">Lab #5</text>
</svg>